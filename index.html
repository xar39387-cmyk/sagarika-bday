<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Sagarika</title>
    <style>
        /* General Styling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            transition: background 1.5s ease-in-out;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            background: #ff4757;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        button:hover {
            transform: scale(1.1);
        }

        /* Page Transitions */
        .hidden { display: none; }

        /* Background Colors */
        .bg-page1 { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); color: #fff; }
        .bg-dark { background: #000; color: #000; } /* Initial dark for Page 2 */
        .bg-romantic { background: radial-gradient(circle, #ff0055, #000); color: white; animation: glow 2s infinite alternate; }
        .bg-final { background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%); color: white; }

        @keyframes glow {
            from { box-shadow: inset 0 0 50px #ff0055; }
            to { box-shadow: inset 0 0 100px #ff0055; }
        }

        /* Animations */
        .fade-in { animation: fadeIn 2s forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart { color: #ff4757; font-size: 5rem; }
    </style>
</head>
<body class="bg-page1" id="bodyBg">

    <div id="page1" class="container">
        <h1 class="fade-in">Hello Sagarika 👋</h1>
        <button onclick="goToPage2()">Next</button>
    </div>

    <div id="page2" class="container hidden">
        <div class="heart">❤️</div>
        <h1 id="loveText">I Love You</h1>
        <button id="nextBtn2" class="hidden" onclick="goToPage3()">Next</button>
    </div>

    <div id="page3" class="container hidden">
        <h1 class="fade-in">From your Pati dev 👑</h1>
        <p style="font-size: 1.5rem;">Forever Yours!</p>
    </div>

    <script>
        function goToPage2() {
            // First make it dark
            document.getElementById('page1').classList.add('hidden');
            const body = document.getElementById('bodyBg');
            body.className = 'bg-dark';

            // After a short delay, turn on the lights!
            setTimeout(() => {
                body.className = 'bg-romantic';
                document.getElementById('page2').classList.remove('hidden');
                document.getElementById('page2').classList.add('fade-in');
                
                // Show the button after 2 seconds
                setTimeout(() => {
                    document.getElementById('nextBtn2').classList.remove('hidden');
                    document.getElementById('nextBtn2').classList.add('fade-in');
                }, 2000);
            }, 1000);
        }

        function goToPage3() {
            document.getElementById('page2').classList.add('hidden');
            document.getElementById('bodyBg').className = 'bg-final';
            document.getElementById('page3').classList.remove('hidden');
        }
    </script>
</body>
</html>
